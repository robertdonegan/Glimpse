name: Deploy to GitHub Pages

# Builds the Vite web app (in glimpse/) and publishes it to GitHub Pages.
# The desktop Tauri build is unaffected — this only ships the browser version.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glimpse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: glimpse/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
      - name: SPA fallback (404 = index)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: glimpse/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
